services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      DATABASE_URL: mongodb://mongo:27017/message_app
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      AUTH_COOKIE_NAME: message_app_token
      AUTH_COOKIE_SECURE: "false"
      AUTH_TOKEN_TTL: 7d
      PUSHER_APP_ID: ${PUSHER_APP_ID:-dev-pusher-app}
      PUSHER_APP_KEY: ${PUSHER_APP_KEY:-dev-pusher-key}
      PUSHER_SECRET: ${PUSHER_SECRET:-dev-pusher-secret}
      PUSHER_CLUSTER: ${PUSHER_CLUSTER:-sa1}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_PUSHER_APP_KEY: ${NEXT_PUBLIC_PUSHER_APP_KEY:-dev-pusher-key}
        NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME:-}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
      AUTH_COOKIE_NAME: message_app_token
    ports:
      - "3000:3000"

volumes:
  mongo_data:
